# Global settings
global:
  imagePullPolicy: IfNotPresent
  # imagePullSecrets:
  #   - name: regcred

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Application settings
app:
  replicaCount: 1
  image:
    repository: stratum
    tag: latest
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
  startupProbe:
    enabled: true
    failureThreshold: 30
    periodSeconds: 5
    timeoutSeconds: 3

# Frontend settings
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: stratum-frontend
    tag: latest
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  # nginx 反代后端的地址（集群内 service 名）
  backendServiceName: stratum-ai
  backendServicePort: 80
  proxy:
    readTimeout: "60s"
    sendTimeout: "60s"

# Configuration settings
config:
  port: "8080"
  logLevel: "info"
  environment: "demo"
  natsUrl: "nats://nats:4222"
  milvusHost: "milvus"
  milvusPort: "19530"
  otelServiceName: "stratum-ai"
  otelExporterType: "otlp"
  otelSamplingRatio: "0.1"
  postgresDsn: ""
  redisAddr: ""
  frontendUrl: "http://localhost:3002"
  githubCallbackUrl: "http://localhost:8080/auth/github/callback"
  secureCookies: "false"

secrets:
  create: false
  name: "stratum-secrets"
  data: {}

database:
  external: false
  host: "stratum-postgresql"
  port: 5432
  name: "stratum"
  user: "stratum"
  image:
    repository: postgres
    tag: "16-alpine"
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

redis:
  external: false
  host: "stratum-redis"
  port: 6379
  image:
    repository: redis
    tag: "7-alpine"
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

# Message queue settings
nats:
  enabled: true
  host: "stratum-nats"
  image:
    repository: nats
    tag: "2.10.25-alpine"
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Vector database settings
milvus:
  enabled: true
  image:
    repository: milvusdb/milvus
    tag: "v2.4.15"
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

etcd:
  image:
    repository: quay.io/coreos/etcd
    tag: "v3.5.16"
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

minio:
  image:
    repository: minio/minio
    tag: "latest"
  rootUser: "minioadmin"
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Observability settings
observability:
  enabled: true
  otelCollectorEndpoint: "http://otel-collector:4317"

# Persistence settings
persistence:
  enabled: true
  storageClass: ""
  size: 10Gi

# Ingress settings
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false
