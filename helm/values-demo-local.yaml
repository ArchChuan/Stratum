global:
  imagePullPolicy: Never  # 强制使用本地镜像

app:
  replicaCount: 1
  image:
    repository: stratum-backend  # 本地镜像，去掉阿里云仓库前缀
    tag: demo
  service:
    type: NodePort  # 改为 NodePort 以便外部访问
    port: 80
    nodePort: 30080  # 固定端口
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: stratum-frontend  # 本地镜像
    tag: demo
  service:
    type: NodePort  # 改为 NodePort
    port: 80
    nodePort: 30000  # 固定端口，前端访问入口
  backendServiceName: stratum
  backendServicePort: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

config:
  port: "8080"
  logLevel: "info"
  environment: "demo"
  natsUrl: "nats://stratum-nats:4222"
  milvusHost: "stratum-milvus"
  milvusPort: "19530"
  otelCollectorEndpoint: "http://stratum-otel-collector:4317"
  otelServiceName: "stratum-ai"
  otelExporterType: "otlp"
  otelSamplingRatio: "0.1"
  frontendUrl: "http://101.200.181.141:30000"  # 修改为实际服务器地址
  githubCallbackUrl: "http://101.200.181.141:30000/api/v1/auth/github/callback"  # API 回调地址
  secureCookies: "false"  # HTTP 环境不使用 secure cookies

secrets:
  create: false  # 手动创建 Secret
  name: "stratum-secrets"

database:
  external: false
  host: "stratum-postgresql"
  port: 5432
  name: "stratum"
  user: "stratum"
  image:
    repository: postgres
    tag: "16-alpine"
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

redis:
  external: false
  host: "stratum-redis"
  port: 6379
  image:
    repository: redis
    tag: "7.2.10-alpine3.21"
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

nats:
  enabled: true
  host: "stratum-nats"
  image:
    repository: nats
    tag: "2.10.25-alpine"
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

milvus:
  enabled: true
  image:
    repository: milvusdb/milvus
    tag: "v2.4.15"
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"  # 从 4Gi 降到 2Gi，节省内存

etcd:
  image:
    repository: quay.io/coreos/etcd
    tag: "v3.5.16"
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

minio:
  image:
    repository: minio/minio
    tag: "latest"
  rootUser: "minioadmin"
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

observability:
  enabled: false  # 演示环境禁用 observability
  otelCollectorEndpoint: "http://stratum-otel-collector:4317"

persistence:
  enabled: true
  storageClass: "local-path"  # K3s 默认存储类
  size: 10Gi

ingress:
  enabled: false  # 演示环境禁用 Ingress，直接用 NodePort

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false
