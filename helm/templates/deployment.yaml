apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stratum.fullname" . }}
  labels:
    {{- include "stratum.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.app.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "stratum.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "stratum.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "stratum.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "stratum.image" .Values.app.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: ENVIRONMENT
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: NATS_URL
            - name: MILVUS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: MILVUS_HOST
            - name: MILVUS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: MILVUS_PORT
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: OTEL_SERVICE_NAME
            - name: OTEL_EXPORTER_TYPE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: OTEL_EXPORTER_TYPE
            - name: OTEL_SAMPLING_RATIO
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: OTEL_SAMPLING_RATIO
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: POSTGRES_USER
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: REDIS_ADDR
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name | quote }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: {{ printf "postgres://%s:$(POSTGRES_PASSWORD)@%s:%v/%s?sslmode=disable" .Values.database.user .Values.database.host .Values.database.port .Values.database.name | quote }}
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: REDIS_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name | quote }}
                  key: OPENAI_API_KEY
                  optional: true
            - name: JWT_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name | quote }}
                  key: JWT_PRIVATE_KEY_PEM
                  optional: true
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name | quote }}
                  key: GITHUB_CLIENT_ID
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name | quote }}
                  key: GITHUB_CLIENT_SECRET
                  optional: true
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: FRONTEND_URL
            - name: GITHUB_CALLBACK_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: GITHUB_CALLBACK_URL
            - name: SECURE_COOKIES
              valueFrom:
                configMapKeyRef:
                  name: {{ include "stratum.fullname" . }}-config
                  key: SECURE_COOKIES
            - name: GLOBAL_AGENT_SYSTEM_PROMPT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name | quote }}
                  key: GLOBAL_AGENT_SYSTEM_PROMPT
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.app.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.app.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.readinessProbe.periodSeconds }}
          {{- if .Values.app.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: {{ .Values.app.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.app.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.app.startupProbe.timeoutSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
