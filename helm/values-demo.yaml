global:
  imagePullPolicy: IfNotPresent

imagePullSecrets:
  - name: aliyun-registry

app:
  replicaCount: 1
  image:
    repository: registry.cn-hangzhou.aliyuncs.com/stratum-demo/stratum-backend
    tag: demo
    digest: ""
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: registry.cn-hangzhou.aliyuncs.com/stratum-demo/stratum-frontend
    tag: demo
    digest: ""
  service:
    type: ClusterIP
    port: 80
  backendServiceName: stratum
  backendServicePort: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

config:
  port: "8080"
  logLevel: "info"
  environment: "demo"
  natsUrl: "nats://stratum-nats:4222"
  milvusHost: "stratum-milvus"
  milvusPort: "19530"
  otelCollectorEndpoint: "http://stratum-otel-collector:4317"
  otelServiceName: "stratum-ai"
  otelExporterType: "otlp"
  otelSamplingRatio: "0.1"
  frontendUrl: "http://101.200.181.141"
  githubCallbackUrl: "http://101.200.181.141/api/auth/github/callback"
  secureCookies: "false"

secrets:
  create: false
  name: "stratum-secrets"

database:
  external: false
  host: "stratum-postgresql"
  port: 5432
  name: "stratum"
  user: "stratum"
  image:
    repository: postgres
    # 16-zhparser: 带 zhparser（中文全文检索）的自建镜像，由 deploy.yml 从
    # docker/postgres-zhparser.Dockerfile 构建并推送。CD 会把 repository 覆盖为
    # <CR>/postgres，此 tag 选中 zhparser 构建；必须与 deploy.yml 产出的 tag 保持
    # 一致。纯净 postgres:16-alpine 会使 chinese_zh 降级为 simple（中文召回≈0）。
    tag: "16-zhparser"
    digest: ""
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

redis:
  external: false
  host: "stratum-redis"
  port: 6379
  image:
    repository: redis
    tag: "7.2.10-alpine3.21"
    digest: ""
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

nats:
  enabled: true
  host: "stratum-nats"
  image:
    repository: nats
    tag: "2.10.25-alpine"
    digest: ""
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

milvus:
  enabled: true
  image:
    repository: milvusdb/milvus
    tag: "v2.4.15"
    digest: ""
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

etcd:
  image:
    repository: quay.io/coreos/etcd
    tag: "v3.5.16"
    digest: ""
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

minio:
  image:
    repository: minio/minio
    tag: "RELEASE.2025-04-22T22-12-26Z"
    digest: ""
  rootUser: "minioadmin"
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

observability:
  enabled: false
  otelCollectorEndpoint: "http://stratum-otel-collector:4317"

persistence:
  enabled: true
  storageClass: "local-path"
  size: 10Gi

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
          service: frontend
  tls: []

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false
