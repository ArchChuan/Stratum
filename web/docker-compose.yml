version: '3.9'

services:
  # 生产模式：nginx 静态服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODE: production
    image: clawhermes-frontend:latest
    container_name: clawhermes-frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - clawhermes-net

  # 开发模式：热重载（单独启动用 docker compose --profile dev up）
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: clawhermes-frontend-dev:latest
    container_name: clawhermes-frontend-dev
    profiles: ["dev"]
    ports:
      - "3002:3002"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./.env.docker:/app/.env.docker
    environment:
      - VITE_API_BASE_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - clawhermes-net

  # 后端占位（实际后端在项目根目录管理）
  backend:
    image: clawhermes-backend:latest
    container_name: clawhermes-backend
    ports:
      - "8080:8080"
    networks:
      - clawhermes-net

networks:
  clawhermes-net:
    name: clawhermes-net
    driver: bridge
