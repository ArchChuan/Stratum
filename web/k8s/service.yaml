apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: clawhermes
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
---
# 如需从集群外访问，使用 NodePort 或 Ingress
# 取消注释以启用 NodePort
