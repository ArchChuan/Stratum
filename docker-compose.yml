version: '3.8'

services:
  # ============================================
  # 后端应用
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: clawhermes-ai-go:local
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NATS_URL=nats://nats:4222
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=clawhermes-ai
    networks:
      - clawhermes
    depends_on:
      - nats
      - milvus
      - neo4j
    profiles:
      - app

  # ============================================
  # 前端应用（生产模式）
  # ============================================
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: clawhermes-frontend:local
    ports:
      - "3002:80"
    networks:
      - clawhermes
    depends_on:
      - backend
    profiles:
      - app

  # ============================================
  # 前端开发服务器（热重载）
  # ============================================
  frontend-dev:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    image: clawhermes-frontend-dev:local
    ports:
      - "3002:3002"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
    environment:
      - VITE_API_BASE_URL=http://backend:8080
    networks:
      - clawhermes
    depends_on:
      - backend
    profiles:
      - dev

  # OpenTelemetry Collector - 收集、处理、导出 telemetry 数据
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # OTLP HTTP receiver
      - "8888:8888"  # Prometheus metrics
      - "8889:8889"  # Prometheus exporter
      - "9411:9411"  # Zipkin receiver
      - "13133:13133"  # Health check
      - "1777:1777"  # pprof
      - "55679:55679"  # zPages
    networks:
      - clawhermes
    depends_on:
      - jaeger

  # Jaeger - 分布式追踪系统
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "5775:5775/udp"  # accept zipkin.thrift over compact thrift protocol
      - "6831:6831/udp"  # accept jaeger.thrift over compact thrift protocol
      - "6832:6832/udp"  # accept jaeger.thrift over binary thrift protocol
      - "5778:5778"      # accept zipkin.thrift over json
      - "16686:16686"    # serve frontend
      - "14268:14268"    # accept jaeger.thrift directly from clients
      - "14250:14250"    # accept model.proto
      - "9411:9411"      # Zipkin compatible endpoint
    networks:
      - clawhermes
    volumes:
      - jaeger_data:/var/lib/jaeger

  # Prometheus - 指标收集和存储
  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - clawhermes

  # Grafana - 可视化仪表板
  grafana:
    image: grafana/grafana:11.0.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    networks:
      - clawhermes
    depends_on:
      - prometheus

  # NATS - 消息队列
  nats:
    image: nats:2.10.25-alpine
    command: "-js"
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    networks:
      - clawhermes
    volumes:
      - nats_data:/data

  # Neo4j - 图数据库
  neo4j:
    image: neo4j:5.25.1-community
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_default__advertised__address=neo4j:7687
      - NEO4J_dbms_connector_bolt_advertised__address=:7687
      - NEO4J_dbms_connector_http_advertised__address=:7474
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - clawhermes
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # ETCD - Milvus 元数据存储
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - clawhermes

  # MinIO - Milvus 对象存储
  minio:
    image: minio/minio:RELEASE.2024-05-16T23-27-28Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - clawhermes

  # Milvus Standalone - 向量数据库
  milvus:
    image: milvusdb/milvus:v2.4.15
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    networks:
      - clawhermes
    depends_on:
      - etcd
      - minio

  # PostgreSQL - 关系型数据库（多租户元数据）
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clawhermes
      POSTGRES_PASSWORD: clawhermes
      POSTGRES_DB: clawhermes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clawhermes

  # Redis - 缓存和会话存储
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - clawhermes
    volumes:
      - redis_data:/data

networks:
  clawhermes:
    driver: bridge

volumes:
  jaeger_data:
  prometheus_data:
  grafana_data:
  nats_data:
  neo4j_data:
  neo4j_logs:
  etcd_data:
  minio_data:
  milvus_data:
  postgres_data:
  redis_data: