name: Memory E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'internal/memory/**'
      - 'internal/agent/application/**'
      - 'internal/agent/domain/port/**'
      - 'internal/agent/infrastructure/persistence/**'
      - 'api/wiring/**'
      - 'pkg/storage/postgres/**'
      - 'pkg/storage/milvus/**'
      - 'test/e2e/**'
      - 'test/integration/**'
      - 'docker-compose.milvus-test.yml'
      - 'go.mod'
      - 'go.sum'
  push:
    branches: [main]
    paths:
      - 'internal/memory/**'
      - 'internal/agent/application/**'
      - 'internal/agent/domain/port/**'
      - 'internal/agent/infrastructure/persistence/**'
      - 'api/wiring/**'
      - 'pkg/storage/postgres/**'
      - 'pkg/storage/milvus/**'
      - 'test/e2e/**'
      - 'test/integration/**'
      - 'docker-compose.milvus-test.yml'

env:
  GO_VERSION: "1.25"
  GOPROXY: "https://goproxy.cn,direct"

jobs:
  e2e-memory:
    name: Memory E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stratum_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Wait for PostgreSQL
        run: |
          timeout 30 bash -c 'until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done'
        env:
          PGPASSWORD: postgres

      - name: Enable pg_trgm extension
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d stratum_test -c \
            "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Start Milvus 2.4.15 and preflight TCP
        run: |
          docker compose -f docker-compose.milvus-test.yml up -d
          timeout 120 bash -c 'until (echo > /dev/tcp/127.0.0.1/19530) >/dev/null 2>&1; do sleep 2; done'

      - name: Run fail-closed Milvus readiness and integration tests
        run: go test -tags=integration ./test/integration -count=1 -v -timeout 5m
        env:
          TEST_MILVUS_HOST: localhost
          TEST_MILVUS_PORT: "19530"
          REQUIRE_MILVUS_E2E: "1"

      - name: Run E2E tests
        run: |
          go test -v -timeout 10m ./test/e2e/... \
            -count=1 \
            -p=1
        env:
          TEST_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/stratum_test?sslmode=disable
          TEST_REDIS_ADDR: localhost:6379
          REQUIRE_MEMORY_E2E: "1"

      - name: Cleanup test schemas
        if: always()
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d stratum_test -c \
            "SELECT 'DROP SCHEMA IF EXISTS ' || nspname || ' CASCADE;'
             FROM pg_namespace
             WHERE nspname LIKE 'tenant_test_%'" \
            | grep DROP | PGPASSWORD=postgres psql -h localhost -U postgres -d stratum_test || true

      - name: Stop Milvus test stack
        if: always()
        run: docker compose -f docker-compose.milvus-test.yml down -v

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: |
            /tmp/stratum-e2e-*.log
          retention-days: 7
          if-no-files-found: ignore
