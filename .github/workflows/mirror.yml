name: Mirror to Gitee

on:
  push:
    branches: [main, develop]
    tags: ['v*']

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/stratum.git
          git push gitee HEAD:${{ github.ref_name }} --force
          git push gitee --tags --force
