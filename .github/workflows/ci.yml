name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  GOPROXY: "https://goproxy.cn,direct"
  COVERAGE_TARGET: "80"
  COVERAGE_BASELINE: "38.0"

jobs:
  guardrails:
    name: Migration Guardrails
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: tool_permission_ci_only
          POSTGRES_DB: stratum_tool_permission
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stratum_tool_permission"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      STRATUM_TEST_POSTGRES_URL: postgres://postgres:tool_permission_ci_only@127.0.0.1:5432/stratum_tool_permission?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Verify generated agent instructions
        run: make agent-instructions-check

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Test risk regression guard
        run: bash scripts/quality/risk-regression-guard-test.sh

      - name: Test Agent tool permission harness
        run: make tool-permission-test

      - name: Enforce risk regression guard
        run: bash scripts/quality/risk-regression-guard.sh --all

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./... -timeout=5m

      - name: Report coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN{exit !($COVERAGE < $COVERAGE_BASELINE)}"; then
            echo "::error::Coverage ${COVERAGE}% is below enforced baseline ${COVERAGE_BASELINE}%"
            exit 1
          fi
          if awk "BEGIN{exit !($COVERAGE < $COVERAGE_TARGET)}"; then
            echo "::warning::Coverage ${COVERAGE}% is below the ${COVERAGE_TARGET}% target"
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  workflow-e2e:
    name: Workflow E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: workflow_e2e_ci_only
          POSTGRES_DB: stratum_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stratum_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      STRATUM_TEST_POSTGRES_URL: postgres://postgres:workflow_e2e_ci_only@127.0.0.1:5432/stratum_e2e?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Workflow HTTP/PostgreSQL/worker E2E
        run: go test -tags=integration ./test/e2e -run TestWorkflowHTTPPostgresWorkerApprovalRestartAndSSEE2E -count=1 -v

  tool-permission-browser:
    name: Agent Tool Permission Browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run Agent tool permission browser harness
        working-directory: web
        run: npx playwright test e2e/agent-tool-permission.spec.ts --project=mobile-320 --project=desktop-1440

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [guardrails, lint, test, workflow-e2e, tool-permission-browser]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: go build -o bin/server ./cmd/server

      - name: go vet
        run: go vet ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0

      - name: Run gosec
        run: gosec -severity high -confidence high -fmt=sarif -out=results.sarif ./...

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true
