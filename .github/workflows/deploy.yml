name: Build and Deploy to K8s

on:
  push:
    branches:
      - main          # 推送到 main 分支触发生产部署
      - develop       # 推送到 develop 分支触发开发环境部署
    tags:
      - 'v*'          # 推送 tag 触发发版

  workflow_dispatch:  # 支持手动触发

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY_URL }}
  IMAGE_NAME: stratum

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: |
          go test -short ./...
          go vet ./...

      - name: Run linters
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.13.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "namespace=stratum" >> $GITHUB_OUTPUT
            echo "values_file=values-prod.yaml" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "namespace=stratum-dev" >> $GITHUB_OUTPUT
            echo "values_file=values-dev.yaml" >> $GITHUB_OUTPUT
          fi

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ steps.env.outputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/Update secrets
        run: |
          kubectl create secret generic stratum-secrets \
            --from-literal=postgresPassword="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=githubClientSecret="${{ secrets.GITHUB_CLIENT_SECRET }}" \
            --from-literal=jwtPrivateKey="$(echo '${{ secrets.JWT_PRIVATE_KEY }}' | base64 -d)" \
            --namespace=${{ steps.env.outputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install stratum ./helm \
            -f helm/${{ steps.env.outputs.values_file }} \
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --namespace=${{ steps.env.outputs.namespace }} \
            --create-namespace \
            --wait \
            --timeout=10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/stratum-backend -n ${{ steps.env.outputs.namespace }}
          kubectl get pods -n ${{ steps.env.outputs.namespace }}
          kubectl get ingress -n ${{ steps.env.outputs.namespace }}

      - name: Run smoke tests
        run: |
          sleep 30
          POD=$(kubectl get pod -n ${{ steps.env.outputs.namespace }} -l app=stratum-backend -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n ${{ steps.env.outputs.namespace }} $POD -- wget -q -O- http://localhost:8080/health || exit 1

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment successful to ${{ steps.env.outputs.environment }}"
          echo "Namespace: ${{ steps.env.outputs.namespace }}"
          echo "Image tag: ${{ needs.build-and-push.outputs.image-tag }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, rolling back..."
          helm rollback stratum -n ${{ steps.env.outputs.namespace }} || true
