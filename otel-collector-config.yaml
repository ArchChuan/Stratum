receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 64
      http:
        endpoint: 0.0.0.0:4318

  # 从 Docker 容器 stdout 采集结构化 JSON 日志
  filelog:
    include: [/var/lib/docker/containers/*/*.log]
    include_file_name: false
    include_file_path: true
    operators:
      # 1. 解析 Docker 日志包装层：{"log":"...","stream":"stdout","time":"..."}
      - type: json_parser
        timestamp:
          parse_from: attributes.time
          layout_type: gotime
          layout: '2006-01-02T15:04:05.999999999Z07:00'
      # 2. 过滤只保留 stdout
      - type: filter
        expr: 'attributes["stream"] == "stderr"'
      # 3. 解析 stratum 应用 JSON（NewLogger 生产模式输出）
      - type: json_parser
        parse_from: attributes.log
        if: 'attributes["log"] != nil'
        on_error: send
      # 4. 将 msg 字段提升为日志 body
      - type: move
        from: attributes.msg
        to: body
        if: 'attributes["msg"] != nil'

  prometheus:
    config:
      scrape_configs:
        - job_name: 'stratum-ai'
          scrape_interval: 30s
          static_configs:
            - targets: ['host.docker.internal:8080']
          metrics_path: /metrics

  zipkin:
    endpoint: 0.0.0.0:9411

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024

  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  resource:
    attributes:
      - key: environment
        value: production
        action: upsert

  # ====================== 最终修复：convert 必须加 converted_type ======================
  attributes:
    actions:
      - key: http.status_code
        action: convert
        converted_type: int

  tail_sampling:
    policies:
      - name: error-policy
        type: status_code
        status_code:
          status_codes: [ERROR]

      - name: slow-policy
        type: latency
        latency:
          threshold_ms: 1000

      - name: default-policy
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

  # 只保留 app=stratum 的日志，过滤其他容器噪音
  filter/stratum:
    logs:
      include:
        match_type: strict
        record_attributes:
          - key: app
            value: stratum

exporters:
  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: stratum
    const_labels:
      cluster: production

  logging:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 100

  # 推送结构化日志到 Loki；level/service_name 作为低基数 label
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: true
      instance: false
      level: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888

  extensions: [health_check, pprof, zpages]

  pipelines:
    traces:
      receivers: [otlp, zipkin]
      processors: [memory_limiter, resource, attributes, tail_sampling, batch]
      exporters: [otlp, logging]

    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus, logging]

    logs:
      receivers: [otlp, filelog]
      processors: [memory_limiter, filter/stratum, batch]
      exporters: [loki, logging]
