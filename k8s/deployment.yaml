---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stratum-ai
  namespace: stratum
  labels:
    app: stratum-ai
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: stratum-ai
  template:
    metadata:
      labels:
        app: stratum-ai
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: stratum-ai
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: stratum-ai
          image: stratum-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            # 从 ConfigMap 读取配置
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: ENVIRONMENT
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: NATS_URL
            - name: MILVUS_HOST
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: MILVUS_HOST
            - name: MILVUS_PORT
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: MILVUS_PORT
            - name: NEO4J_URI
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: NEO4J_URI
            - name: NEO4J_USER
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: NEO4J_USER
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: OTEL_SERVICE_NAME
            - name: OTEL_EXPORTER_TYPE
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: OTEL_EXPORTER_TYPE
            - name: OTEL_SAMPLING_RATIO
              valueFrom:
                configMapKeyRef:
                  name: stratum-config
                  key: OTEL_SAMPLING_RATIO

            # 从 Secret 读取敏感配置
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stratum-secrets
                  key: NEO4J_PASSWORD
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stratum-secrets
                  key: OPENAI_API_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: stratum-secrets
                  key: JWT_SECRET

            # Pod 信息
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: stratum-ai
  namespace: stratum
  labels:
    app: stratum-ai
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: stratum-ai
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stratum-ai-hpa
  namespace: stratum
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stratum-ai
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stratum-ai
  namespace: stratum
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/stratum-role

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: stratum-ai-pdb
  namespace: stratum
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: stratum-ai
