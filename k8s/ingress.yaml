---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clawhermes-ai-ingress
  namespace: clawhermes
  annotations:
    # 使用 NGINX Ingress Controller
    kubernetes.io/ingress.class: nginx
    # TLS 配置
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # 自定义 nginx 配置
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # OpenTelemetry 注入
    nginx.ingress.kubernetes.io/configuration-snippet: |
      opentracing_load_balancer_policy "round_robin";
spec:
  tls:
    - hosts:
        - api.clawhermes.example.com
      secretName: clawhermes-tls
  rules:
    - host: api.clawhermes.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clawhermes-ai
                port:
                  number: 80

---
# ServiceMonitor for Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: clawhermes-ai
  namespace: clawhermes
  labels:
    release: prometheus-operator
spec:
  selector:
    matchLabels:
      app: clawhermes-ai
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scheme: http
      scrapeTimeout: 10s

---
# PodMonitor for advanced monitoring
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: clawhermes-ai-pod
  namespace: clawhermes
  labels:
    release: prometheus-operator
spec:
  selector:
    matchLabels:
      app: clawhermes-ai
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
          action: replace
