---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stratum-config
  namespace: stratum
data:
  # 应用配置
  PORT: "8080"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"

  # NATS 配置
  NATS_URL: "nats://nats:4222"
  NATS_CLUSTER_ID: "stratum-cluster"

  # Milvus 配置
  MILVUS_HOST: "milvus"
  MILVUS_PORT: "19530"

  # OpenTelemetry 配置
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
  OTEL_SERVICE_NAME: "stratum-ai"
  OTEL_EXPORTER_TYPE: "otlp"
  OTEL_SAMPLING_RATIO: "0.1"
  OPIK_URL: "http://opik:5173/api"
  OPIK_OTLP_ENDPOINT: "http://opik:5173/api/v1/private/otel"
  OPIK_PROJECT: "stratum"
  OPIK_WORKSPACE: "default"
  TRACE_PAYLOAD_ENABLED: "false"
  TRACE_PAYLOAD_ENDPOINT: "minio:9000"
  TRACE_PAYLOAD_BUCKET: "stratum-trace-evidence"
  TRACE_PAYLOAD_USE_TLS: "false"

  # Prometheus 配置
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PATH: "/metrics"

  # 健康检查配置
  HEALTH_CHECK_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30s"

  # Agent 配置
  AGENT_MAX_ITERATIONS: "10"
  AGENT_TIMEOUT: "300s"

  # 记忆系统配置
  MEMORY_ENABLED: "true"
  MEMORY_MAX_ENTRIES: "10000"
  MEMORY_TTL: "86400s"
