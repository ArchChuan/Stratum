apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stratum-local-ingress
  namespace: stratum
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: stratum.local
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: stratum-ai
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
