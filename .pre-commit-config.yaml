repos:
  - repo: local
    hooks:
      # Go formatting
      - id: gofmt
        name: gofmt
        language: system
        entry: gofmt
        args: [-l, -w]
        types: [go]

      # Go vet
      - id: go-vet
        name: go vet
        language: system
        entry: bash
        args: [-c, "go vet ./..."]
        pass_filenames: false
        types: [go]

      # golangci-lint (v2)
      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint
        args: [run, --timeout=5m]
        pass_filenames: false
        types: [go]

      # YAML validation (skip helm templates, k8s, and node_modules)
      - id: check-yaml
        name: check yaml
        language: system
        entry: python3
        args:
          - -c
          - |
            import sys, yaml
            for f in sys.argv[1:]:
                try:
                    yaml.safe_load(open(f))
                except Exception as e:
                    print(f"YAML error in {f}: {e}")
                    sys.exit(1)
        types: [yaml]
        exclude: '(web/node_modules/|helm/templates/|k8s/)'

      # Check for merge conflicts
      - id: check-merge-conflict
        name: check merge conflict
        language: system
        entry: bash
        args:
          - -c
          - |
            if grep -rn "^<<<<<<< " --include="*.go" --include="*.yaml" --include="*.md" \
               --exclude-dir=web/node_modules .; then
              exit 1
            fi
        pass_filenames: false

      # Trailing whitespace (staged Go/YAML/MD files, skip node_modules)
      - id: trailing-whitespace
        name: trailing whitespace
        language: system
        entry: bash
        args:
          - -c
          - |
            files=$(git diff --cached --name-only | grep -E '\.(go|md|yaml)$' | grep -v 'web/node_modules')
            if [ -z "$files" ]; then exit 0; fi
            if echo "$files" | xargs grep -l ' $' 2>/dev/null; then
              echo "Files with trailing whitespace found"
              exit 1
            fi
        pass_filenames: false

      # End of file newline fixer
      - id: end-of-file-fixer
        name: end of file fixer
        language: system
        entry: bash
        args:
          - -c
          - |
            for f in "$@"; do
              if [ -s "$f" ] && [ "$(tail -c1 "$f" | wc -l)" -eq 0 ]; then
                echo "" >> "$f"
              fi
            done
        types: [text]
        exclude: 'web/node_modules/'

      # Detect private keys (exclude example files and this hook script)
      - id: detect-private-key
        name: detect private key
        language: system
        entry: bash
        args:
          - -c
          - |
            for f in "$@"; do
              # Only match actual key blocks (4+ dashes, not example placeholders)
              if grep -qE '^-{5}BEGIN (RSA|DSA|EC|OPENSSH|) *PRIVATE KEY-{5}$' "$f" 2>/dev/null; then
                echo "PRIVATE KEY detected in $f"
                exit 1
              fi
            done
        exclude: '(web/node_modules/|\.pre-commit-config\.yaml$)'

      # Markdown linting (skip node_modules and generated docs)
      - id: markdownlint
        name: markdownlint
        language: system
        entry: markdownlint
        args: [--fix, --config, .markdownlint.json]
        types: [markdown]
        exclude: 'web/node_modules/'

      # Secret scanning with gitleaks
      - id: gitleaks
        name: gitleaks
        language: system
        entry: gitleaks
        args: [protect, --staged, --redact, -v]
        pass_filenames: false

      # Security scanning with Semgrep (Go files only)
      - id: semgrep
        name: semgrep
        language: system
        entry: semgrep
        args: [--config=auto, --quiet, --include=*.go]
        types: [go]
        pass_filenames: false

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks
    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
