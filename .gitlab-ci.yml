stages:
  - test
  - build
  - deploy

variables:
  REGISTRY: $CI_REGISTRY
  IMAGE_NAME: stratum
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# Test stage
test:
  stage: test
  image: golang:1.25
  script:
    - go test -short ./...
    - go vet ./...
  only:
    - main
    - develop
    - merge_requests

lint:
  stage: test
  image: golangci/golangci-lint:latest
  script:
    - golangci-lint run --timeout=5m
  only:
    - main
    - develop
    - merge_requests

# Build stage
build-backend:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login $REGISTRY -u "$DOCKER_USERNAME" --password-stdin
  script:
    - IMAGE_TAG="${CI_COMMIT_SHORT_SHA}"
    - docker build -t $REGISTRY/$IMAGE_NAME-backend:$IMAGE_TAG .
    - docker push $REGISTRY/$IMAGE_NAME-backend:$IMAGE_TAG
    - docker tag $REGISTRY/$IMAGE_NAME-backend:$IMAGE_TAG $REGISTRY/$IMAGE_NAME-backend:$CI_COMMIT_REF_NAME
    - docker push $REGISTRY/$IMAGE_NAME-backend:$CI_COMMIT_REF_NAME
  only:
    - main
    - develop

build-frontend:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login $REGISTRY -u "$DOCKER_USERNAME" --password-stdin
  script:
    - IMAGE_TAG="${CI_COMMIT_SHORT_SHA}"
    - docker build -t $REGISTRY/$IMAGE_NAME-frontend:$IMAGE_TAG ./web
    - docker push $REGISTRY/$IMAGE_NAME-frontend:$IMAGE_TAG
    - docker tag $REGISTRY/$IMAGE_NAME-frontend:$IMAGE_TAG $REGISTRY/$IMAGE_NAME-frontend:$CI_COMMIT_REF_NAME
    - docker push $REGISTRY/$IMAGE_NAME-frontend:$CI_COMMIT_REF_NAME
  only:
    - main
    - develop

# Deploy stage
.deploy_template: &deploy_template
  stage: deploy
  image: alpine/helm:3.13.0
  before_script:
    - apk add --no-cache kubectl
    - mkdir -p $HOME/.kube
    - echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
    - chmod 600 $HOME/.kube/config
  script:
    - kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    - |
      kubectl create secret generic stratum-secrets \
        --from-literal=postgresPassword="$POSTGRES_PASSWORD" \
        --from-literal=githubClientSecret="$GITHUB_CLIENT_SECRET" \
        --from-literal=jwtPrivateKey="$(echo $JWT_PRIVATE_KEY | base64 -d)" \
        --namespace=$NAMESPACE \
        --dry-run=client -o yaml | kubectl apply -f -
    - |
      helm upgrade --install stratum ./helm \
        -f helm/$VALUES_FILE \
        --set image.tag=$CI_COMMIT_SHORT_SHA \
        --namespace=$NAMESPACE \
        --create-namespace \
        --wait \
        --timeout=10m
    - kubectl rollout status deployment/stratum-backend -n $NAMESPACE
    - kubectl get pods -n $NAMESPACE
  after_script:
    - |
      if [ $CI_JOB_STATUS == 'failed' ]; then
        echo "Deployment failed, rolling back..."
        helm rollback stratum -n $NAMESPACE || true
      fi

deploy-dev:
  <<: *deploy_template
  variables:
    NAMESPACE: "stratum-dev"
    VALUES_FILE: "values-dev.yaml"
  only:
    - develop
  environment:
    name: development
    url: https://api-dev.yourdomain.com

deploy-prod:
  <<: *deploy_template
  variables:
    NAMESPACE: "stratum"
    VALUES_FILE: "values-prod.yaml"
  only:
    - main
  environment:
    name: production
    url: https://api.yourdomain.com
  when: manual  # 生产环境需要手动触发
