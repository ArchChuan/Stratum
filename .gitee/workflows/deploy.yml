name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY_URL }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: |
          go test -short ./...
          go vet ./...

      - name: Run linters
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "value=main-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/stratum-backend:${{ steps.tag.outputs.value }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/stratum-frontend:${{ steps.tag.outputs.value }}

  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.13.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster
        run: kubectl get nodes

      - name: Apply namespace and secrets
        run: |
          kubectl create namespace stratum --dry-run=client -o yaml | kubectl apply -f -
          JWT_KEY=$(echo "${{ secrets.JWT_PRIVATE_KEY }}" | base64 -d)
          kubectl create secret generic stratum-secrets \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=JWT_PRIVATE_KEY_PEM="$JWT_KEY" \
            -n stratum --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy
        run: |
          helm upgrade --install stratum ./helm \
            -f helm/values-demo.yaml \
            --set app.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --set frontend.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            -n stratum --wait --timeout=10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/stratum-backend -n stratum
          sleep 20
          POD=$(kubectl get pod -n stratum -l app=stratum-backend -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n stratum $POD -- wget -q -O- http://localhost:8080/health

      - name: Rollback on failure
        if: failure()
        run: helm rollback stratum -n stratum || true
