version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # security
    - gosec
    # HTTP safety
    - bodyclose
    - noctx
    # style / quality
    - revive
    - gocritic
    - forbidigo
    # architecture
    - depguard
  settings:
    forbidigo:
      # 日志红线：禁止 fmt.Print* 直写 stdout，必须走 observability.Logger（Zap）。
      # cmd/ 启动横幅与 _test.go 由 exclusions 放行。
      forbid:
        - pattern: '^fmt\.Print(f|ln)?$'
          msg: "禁止 fmt.Print*；使用 observability.NewLogger(env) 的 Zap logger"
    depguard:
      rules:
        application-no-infra:
          # application 层禁止直接 import 任何 infrastructure 包；
          # 必须改为 domain/port 接口 + api/wiring 注入。
          list-mode: lax
          files:
            - "**/internal/*/application/**"
          deny:
            - pkg: "github.com/byteBuilderX/stratum/internal/agent/infrastructure"
              desc: "application 不得直接 import infrastructure；改为 domain/port + wiring 注入"
            - pkg: "github.com/byteBuilderX/stratum/internal/memory/infrastructure"
              desc: "application 不得直接 import infrastructure；改为 domain/port + wiring 注入"
            - pkg: "github.com/byteBuilderX/stratum/internal/knowledge/infrastructure"
              desc: "application 不得直接 import infrastructure；改为 domain/port + wiring 注入"
            - pkg: "github.com/byteBuilderX/stratum/internal/skill/infrastructure"
              desc: "application 不得直接 import infrastructure；改为 domain/port + wiring 注入"
            - pkg: "github.com/byteBuilderX/stratum/internal/mcp/infrastructure"
              desc: "application 不得直接 import infrastructure；改为 domain/port + wiring 注入"
            - pkg: "github.com/byteBuilderX/stratum/internal/iam/infrastructure"
              desc: "application 不得直接 import infrastructure；改为 domain/port + wiring 注入"
            - pkg: "github.com/byteBuilderX/stratum/internal/llmgateway/infrastructure"
              desc: "application 不得直接 import infrastructure；改为 domain/port + wiring 注入"
            - pkg: "github.com/byteBuilderX/stratum/internal/platform/infrastructure"
              desc: "application 不得直接 import infrastructure；改为 domain/port + wiring 注入"
        handler-no-infra:
          # agent_handler 全家已通过 consumer-side port + AgentService 完成拆解。
          # 唯一遗留：auth_handler 依赖 iam/infrastructure/oauth.GitHubClient（OAuth 回调专用），
          # 该依赖无法通过纯 port 接口消除（需要完整 OAuth 流程实现），作为已知技术债保留。
          list-mode: lax
          files:
            - "**/api/http/handler/**"
          deny:
            - pkg: "github.com/byteBuilderX/stratum/internal/agent/infrastructure"
              desc: "handler 不得 import agent/infrastructure；通过 AgentService 调用"
            - pkg: "github.com/byteBuilderX/stratum/internal/memory/infrastructure"
              desc: "handler 不得 import internal infrastructure；通过 application service 调用"
            - pkg: "github.com/byteBuilderX/stratum/internal/knowledge/infrastructure"
              desc: "handler 不得 import internal infrastructure；通过 application service 调用"
            - pkg: "github.com/byteBuilderX/stratum/internal/skill/infrastructure"
              desc: "handler 不得 import internal infrastructure；通过 application service 调用"
            - pkg: "github.com/byteBuilderX/stratum/internal/mcp/infrastructure"
              desc: "handler 不得 import internal infrastructure；通过 application service 调用"
            - pkg: "github.com/byteBuilderX/stratum/internal/iam/infrastructure/persistence"
              desc: "handler 不得 import internal infrastructure；通过 application service 调用"
        handler-no-rawdb:
          # handler 不得直接使用原生 DB / 缓存 / 向量库驱动；
          # 所有数据访问必须经过 application service。
          list-mode: lax
          files:
            - "**/api/http/handler/**"
          deny:
            - pkg: "github.com/jackc/pgx"
              desc: "handler 禁止 pgx 直连；通过 application service"
            - pkg: "github.com/jackc/pgx/v5"
              desc: "handler 禁止 pgx 直连；通过 application service"
            - pkg: "github.com/redis/go-redis"
              desc: "handler 禁止 redis 直连；通过 application service"
            - pkg: "github.com/milvus-io/milvus-sdk-go"
              desc: "handler 禁止 milvus 直连；通过 application service"
            - pkg: "github.com/byteBuilderX/stratum/pkg/tenantdb"
              desc: "handler 禁止使用 tenantdb；通过 reqctx + application service 获取租户上下文"
        domain-no-thirdparty:
          # domain 层禁止引入除 stdlib + pkg/constants 之外的第三方依赖
          list-mode: lax
          files:
            - "**/internal/*/domain/**"
          deny:
            - pkg: "github.com/jackc/pgx"
              desc: "domain 不得 import pgx"
            - pkg: "github.com/go-redis"
              desc: "domain 不得 import redis"
            - pkg: "github.com/gin-gonic/gin"
              desc: "domain 不得 import gin"
            - pkg: "go.uber.org/zap"
              desc: "domain 不得 import zap"
        pkg-no-internal:
          # pkg/ 禁止 import internal/
          list-mode: lax
          files:
            - "**/pkg/**"
          deny:
            - pkg: "github.com/byteBuilderX/stratum/internal"
              desc: "pkg 不得 import internal"
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true
  exclusions:
    paths:
      - web/node_modules
    rules:
      # Test files: unchecked errors and gosec/gocritic/noctx findings are acceptable
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocritic
          - noctx
          - depguard
          - forbidigo

      # cmd/ 入口：logger 初始化前的启动横幅直写 stdout，放行
      - path: 'cmd/'
        linters:
          - forbidigo

      # defer Close/Sync is idiomatic Go — error not actionable at call site
      - text: 'Error return value of `.*\.(Close|Sync|Stop)` is not checked'
        linters:
          - errcheck

      # G104: //nolint:errcheck annotated lines are intentional
      - text: 'G104'
        linters:
          - gosec

      # G101: OAuth URL constant is not a credential
      - text: 'G101'
        linters:
          - gosec

      # G304: intentional file read by path
      - text: 'G304'
        linters:
          - gosec

      # G204: exec.CommandContext with MCP stdio — by design
      - text: 'G204'
        linters:
          - gosec

      # SA5011: pre-existing possible nil dereference in tests — pattern is safe
      - text: 'SA5011'
        linters:
          - staticcheck

      # Known pre-existing staticcheck issues in existing code
      - text: 'S1008'
        linters: [staticcheck]

      - text: 'QF1012'
        linters: [staticcheck]

      - text: 'QF1003'
        linters: [staticcheck]

      - text: 'QF1008'
        linters: [staticcheck]

      - text: 'ST1005'
        linters: [staticcheck]

      # Known pre-existing unused fields (reserved for future use)
      - path: 'internal/agent/a2a/'
        linters: [unused]

      - path: 'internal/mcp/client\.go'
        linters: [unused]

      - path: 'internal/skill/executor\.go'
        linters: [unused]

      - path: 'internal/skillgateway/'
        linters: [unused]

formatters:
  enable:
    - gofmt
    - goimports
