version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # security
    - gosec
    # HTTP safety
    - bodyclose
    - noctx
    # style / quality
    - revive
    - gocritic
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclusions:
    rules:
      # Test files: unchecked errors and gosec/gocritic/noctx findings are acceptable
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocritic
          - noctx

      # defer Close/Sync is idiomatic Go — error not actionable at call site
      - text: 'Error return value of `.*\.(Close|Sync|Stop)` is not checked'
        linters:
          - errcheck

      # G104: //nolint:errcheck annotated lines are intentional
      - text: 'G104'
        linters:
          - gosec

      # G101: OAuth URL constant is not a credential
      - text: 'G101'
        linters:
          - gosec

      # G304: intentional file read by path
      - text: 'G304'
        linters:
          - gosec

      # G204: exec.CommandContext with MCP stdio — by design
      - text: 'G204'
        linters:
          - gosec

      # SA5011: pre-existing possible nil dereference in tests — pattern is safe
      - text: 'SA5011'
        linters:
          - staticcheck

      # Known pre-existing staticcheck issues in existing code
      - text: 'S1008'
        linters: [staticcheck]

      - text: 'QF1012'
        linters: [staticcheck]

      - text: 'QF1003'
        linters: [staticcheck]

      - text: 'QF1008'
        linters: [staticcheck]

      - text: 'ST1005'
        linters: [staticcheck]

      # Known pre-existing unused fields (reserved for future use)
      - path: 'internal/agent/a2a/'
        linters: [unused]

      - path: 'internal/mcp/client\.go'
        linters: [unused]

      - path: 'internal/skill/executor\.go'
        linters: [unused]

      - path: 'internal/skillgateway/'
        linters: [unused]
